name: Agent J — Daily Briefing

on:
  schedule:
    # 매일 오전 7시 KST = 22:00 UTC (전날)
    - cron: '0 22 * * *'
  workflow_dispatch:  # 수동 실행 버튼

jobs:
  send-briefing:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install anthropic python-dotenv feedparser requests

      - name: Run daily briefing
        env:
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_ADDRESS:       ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD:  ${{ secrets.GMAIL_APP_PASSWORD }}
          DIGEST_RECIPIENT:    ${{ secrets.DIGEST_RECIPIENT }}
          PLANNER_MODEL:       claude-haiku-4-5-20251001
          # Notion 연동 (선택 사항 — 없으면 할 일 섹션 자동 생략)
          NOTION_API_KEY:      ${{ secrets.NOTION_API_KEY }}
          NOTION_TASKS_DB_ID:  ${{ secrets.NOTION_TASKS_DB_ID }}
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
          OPENWEATHER_CITY:    ${{ secrets.OPENWEATHER_CITY }}
        run: python news_digest.py
