name: Agent J — Daily News Digest

on:
  schedule:
    # 매일 오전 7시 KST = 22:00 UTC (전날)
    - cron: '0 22 * * *'
  workflow_dispatch:  # 수동 테스트 실행 버튼

jobs:
  send-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic python-dotenv feedparser

      - name: Run news digest
        env:
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_ADDRESS:       ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD:  ${{ secrets.GMAIL_APP_PASSWORD }}
          DIGEST_RECIPIENT:    ${{ secrets.DIGEST_RECIPIENT }}
          PLANNER_MODEL:       claude-haiku-4-5-20251001
        run: python news_digest.py
