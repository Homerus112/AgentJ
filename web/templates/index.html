<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent J — Dashboard</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
         background: #0f0f0f; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }

  /* Header */
  header { background: #1a1a1a; border-bottom: 1px solid #2a2a2a;
           padding: 14px 24px; display: flex; align-items: center; gap: 16px; }
  header h1 { font-size: 18px; font-weight: 600; color: #fff; }
  header h1 span { color: #7c6af7; }
  .stats-bar { display: flex; gap: 20px; margin-left: auto; font-size: 13px; color: #888; }
  .stats-bar strong { color: #ccc; }

  /* Search */
  .search-wrap { padding: 16px 24px; background: #141414; border-bottom: 1px solid #222; }
  .search-wrap input {
    width: 100%; padding: 10px 16px; border-radius: 8px;
    border: 1px solid #333; background: #1e1e1e; color: #e0e0e0;
    font-size: 14px; outline: none;
  }
  .search-wrap input:focus { border-color: #7c6af7; }

  /* Layout */
  .main { display: flex; flex: 1; overflow: hidden; }

  /* Sidebar */
  .sidebar { width: 300px; border-right: 1px solid #222; overflow-y: auto;
             background: #141414; flex-shrink: 0; }
  .sidebar-title { padding: 12px 16px; font-size: 11px; font-weight: 600;
                   color: #666; text-transform: uppercase; letter-spacing: 0.8px; }
  .session-item {
    padding: 12px 16px; border-bottom: 1px solid #1e1e1e; cursor: pointer;
    transition: background 0.15s;
  }
  .session-item:hover { background: #1e1e1e; }
  .session-item.active { background: #1e1e2e; border-left: 3px solid #7c6af7; }
  .session-date { font-size: 11px; color: #666; margin-bottom: 4px; }
  .session-preview { font-size: 13px; color: #bbb; white-space: nowrap;
                     overflow: hidden; text-overflow: ellipsis; }
  .session-count { font-size: 11px; color: #555; margin-top: 4px; }

  /* Chat area */
  .chat-area { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
  .empty-state { margin: auto; text-align: center; color: #555; }
  .empty-state .icon { font-size: 48px; margin-bottom: 12px; }

  /* Messages */
  .msg { display: flex; gap: 12px; max-width: 800px; }
  .msg.user { flex-direction: row-reverse; align-self: flex-end; }
  .avatar {
    width: 32px; height: 32px; border-radius: 50%; display: flex;
    align-items: center; justify-content: center; font-size: 14px;
    font-weight: 600; flex-shrink: 0;
  }
  .msg.user .avatar { background: #7c6af7; color: #fff; }
  .msg.agent .avatar { background: #2a2a2a; color: #aaa; }
  .bubble {
    padding: 10px 14px; border-radius: 12px; font-size: 14px;
    line-height: 1.6; max-width: 600px; white-space: pre-wrap; word-break: break-word;
  }
  .msg.user .bubble { background: #2d2560; color: #e0e0e0; border-radius: 12px 12px 2px 12px; }
  .msg.agent .bubble { background: #1e1e1e; color: #e0e0e0; border-radius: 12px 12px 12px 2px; }
  .agent-label { font-size: 11px; color: #7c6af7; margin-bottom: 4px; font-weight: 600; }
  .msg-time { font-size: 11px; color: #555; margin-top: 4px; }

  /* Search results */
  .search-result {
    padding: 12px; border-radius: 8px; background: #1a1a1a;
    border: 1px solid #2a2a2a; cursor: pointer; transition: border-color 0.15s;
  }
  .search-result:hover { border-color: #7c6af7; }
  .search-result .sr-meta { font-size: 11px; color: #666; margin-bottom: 6px; }
  .search-result .sr-content { font-size: 13px; color: #bbb; }
  mark { background: #3d3060; color: #c9b8ff; border-radius: 2px; padding: 0 2px; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
</style>
</head>
<body>

<header>
  <h1><span>Agent J</span> Dashboard</h1>
  <div class="stats-bar" id="stats">
    <span>세션 <strong id="stat-sessions">-</strong></span>
    <span>메시지 <strong id="stat-msgs">-</strong></span>
  </div>
</header>

<div class="search-wrap">
  <input type="text" id="search-input" placeholder="🔍  대화 내용 검색..." />
</div>

<div class="main">
  <div class="sidebar">
    <div class="sidebar-title">최근 대화</div>
    <div id="session-list"></div>
  </div>
  <div class="chat-area" id="chat-area">
    <div class="empty-state">
      <div class="icon">💬</div>
      <div>왼쪽에서 세션을 선택하거나<br>검색어를 입력하세요</div>
    </div>
  </div>
</div>

<script>
const chatArea = document.getElementById('chat-area');
const sessionList = document.getElementById('session-list');
const searchInput = document.getElementById('search-input');
let activeSessionId = null;
let searchTimeout = null;

// 통계 로드
fetch('/api/stats').then(r => r.json()).then(d => {
  document.getElementById('stat-sessions').textContent = d.total_sessions;
  document.getElementById('stat-msgs').textContent = d.total_messages;
});

// 세션 목록 로드
function loadSessions() {
  fetch('/api/sessions').then(r => r.json()).then(sessions => {
    sessionList.innerHTML = sessions.length === 0
      ? '<div style="padding:16px;color:#555;font-size:13px;">아직 대화 기록이 없어요</div>'
      : sessions.map(s => `
        <div class="session-item" onclick="loadSession('${s.session_id}')" data-id="${s.session_id}">
          <div class="session-date">${formatDate(s.started_at)}</div>
          <div class="session-preview">${escHtml(s.first_message || '(빈 세션)')}</div>
          <div class="session-count">${s.message_count}개 메시지</div>
        </div>
      `).join('');
  });
}

// 세션 대화 로드
function loadSession(sessionId) {
  activeSessionId = sessionId;
  document.querySelectorAll('.session-item').forEach(el => {
    el.classList.toggle('active', el.dataset.id === sessionId);
  });
  fetch(`/api/session/${sessionId}`).then(r => r.json()).then(msgs => {
    chatArea.innerHTML = msgs.map(m => renderMsg(m)).join('');
    chatArea.scrollTop = chatArea.scrollHeight;
  });
}

// 검색
searchInput.addEventListener('input', () => {
  clearTimeout(searchTimeout);
  const q = searchInput.value.trim();
  if (!q) { loadSessions(); return; }
  searchTimeout = setTimeout(() => {
    fetch(`/api/search?q=${encodeURIComponent(q)}`).then(r => r.json()).then(results => {
      if (results.length === 0) {
        chatArea.innerHTML = '<div class="empty-state"><div class="icon">🔍</div><div>검색 결과 없음</div></div>';
        return;
      }
      chatArea.innerHTML = results.map(r => `
        <div class="search-result" onclick="loadSession('${r.session_id}')">
          <div class="sr-meta">${formatDate(r.timestamp)} · ${r.role === 'user' ? '나' : (r.agent || 'Agent J')}</div>
          <div class="sr-content">${highlight(escHtml(r.content), q)}</div>
        </div>
      `).join('');
    });
  }, 300);
});

function renderMsg(m) {
  const isUser = m.role === 'user';
  const avatar = isUser ? 'J' : (m.agent ? m.agent[0].toUpperCase() : 'A');
  const agentLabel = !isUser && m.agent ? `<div class="agent-label">${m.agent}</div>` : '';
  return `
    <div class="msg ${isUser ? 'user' : 'agent'}">
      <div class="avatar">${avatar}</div>
      <div>
        ${agentLabel}
        <div class="bubble">${escHtml(m.content)}</div>
        <div class="msg-time">${formatDate(m.timestamp)}</div>
      </div>
    </div>
  `;
}

function formatDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleString('ko-KR', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
}

function escHtml(str) {
  return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function highlight(str, q) {
  return str.replace(new RegExp(escHtml(q), 'gi'), m => `<mark>${m}</mark>`);
}

loadSessions();
</script>
</body>
</html>
